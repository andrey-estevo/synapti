    <circle cx="-10" cy="10" r="3" fill="#00C896"/>
    <circle cx="-10" cy="25" r="3" fill="#00C896"/>
    <circle cx="-10" cy="40" r="3" fill="#00C896"/>
    <circle cx="60" cy="10" r="3" fill="#00C896"/>
